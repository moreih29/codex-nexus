invocation_map:
  skill_activation:
    skill_prefix: "$"
  subagent_spawn:
    tool: spawn_agent
    role_param: agent_type
    message_param: message
    role_aliases:
      explore: explorer
  task_register:
    surface: "Codex visual progress tracker"
    tool: update_plan
    collection_param: plan
    step_param: step
    status_param: status
  user_question:
    tool: request_user_input
    header: Question
    fallback: prose
skill_harness_docs:
  nx-plan:
    - resume_invocation
  nx-run:
    - resume_invocation
